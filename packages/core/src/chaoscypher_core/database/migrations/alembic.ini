# Minimal Alembic config. The script_location is relative to this file.
# sqlalchemy.url is set at runtime by env.py from the resolved DB path —
# leave it blank here so the config file carries no environment-specific state.
[alembic]
script_location = %(here)s
sqlalchemy.url =
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
