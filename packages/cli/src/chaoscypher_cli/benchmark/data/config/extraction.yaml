# ChaosCypher Default Extraction Benchmark
#
# Runs every extractor in `extractors` against every dataset in `datasets`, scores
# each (model, dataset) pair with the v7 quality scorer, and produces a
# ranked Markdown leaderboard. Use --local-only to skip commercial
# providers when iterating without API keys.
name: "ChaosCypher Extraction Benchmark"
description: "Canonical multi-genre extraction benchmark v1 (literary, technical, scientific)."

# Run params - overridable via CLI flags
seed: 42
temperature: 0.0

# Datasets to evaluate, by id. Resolved against built-in datasets first,
# then user datasets in the data dir (user wins on id collision).
datasets:
  - war_and_peace_tiny
  - tech_encyclopedia_tiny
  - scientific_methods_tiny

# Extractor models to evaluate.
# Optional `kinds: [extraction]` scopes a model to specific dataset kinds.
extractors:
  # --- Anthropic ---
  - provider: anthropic
    model: claude-opus-4-8
    label: "Claude Opus 4.8"

  - provider: anthropic
    model: claude-sonnet-4-6
    label: "Claude Sonnet 4.6"

  - provider: anthropic
    model: claude-haiku-4-5
    label: "Claude Haiku 4.5"

  # --- OpenAI ---
  - provider: openai
    model: gpt-4o
    label: "GPT-4o"

  - provider: openai
    model: gpt-4o-mini
    label: "GPT-4o Mini"

  # --- Google Gemini ---
  - provider: gemini
    model: gemini-2.5-pro
    label: "Gemini 2.5 Pro"

  - provider: gemini
    model: gemini-2.5-flash
    label: "Gemini 2.5 Flash"

  # --- Local (Ollama, ≤24 GB) ---
  - provider: ollama
    model: "gemma4:12b"
    label: "Gemma 4 12B (local)"

  - provider: ollama
    model: "gemma4:26b"
    label: "Gemma 4 26B (local)"

  - provider: ollama
    model: "qwen3:8b"
    label: "Qwen3 8B (local)"

  - provider: ollama
    model: "qwen3:14b"
    label: "Qwen3 14B (local)"

  - provider: ollama
    model: "qwen3.6:35b-a3b"
    label: "Qwen3.6 35B-A3B MoE (local)"

  - provider: ollama
    model: "gpt-oss:20b"
    label: "GPT-OSS 20B (local)"

  - provider: ollama
    model: "glm4:9b"
    label: "GLM4 9B (local)"
