# Docker Compose for Chaos Cypher Neural Architecture - Development Mode
# Orchestrates all packages: Core, Cortex, Neuron, Interface
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#
# Architecture:
#   - Core: Brain (business logic)
#   - Cortex: Processing center (full backend API, supports reader mode)
#   - Neuron: Unified worker (LLM + Operations queues)
#   - Interface: Interaction layer (web UI)

name: chaoscypher

services:
  # Valkey service (Queue backend)
  valkey:
    image: valkey/valkey:8.1.6-alpine
    container_name: chaoscypher-valkey
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Valkey is internal-only - access via: docker exec chaoscypher-valkey valkey-cli
    volumes:
      - valkey-data:/data
    command:
      - sh
      - -c
      - |
        if [ -f /data/appendonlydir/appendonly.aof.manifest ]; then
          echo "AOF manifest found, checking integrity..."
          if ! yes | valkey-check-aof --fix /data/appendonlydir/appendonly.aof.manifest 2>&1; then
            echo "AOF repair failed, removing corrupted AOF directory"
            rm -rf /data/appendonlydir
          fi
        fi
        # Generate an ACL file that combines auth (replacing
        # --requirepass) with command restrictions on the default user.
        # Embedding restrictions in the file applies them atomically at
        # startup with no race window (post-start ACL SETUSER does not
        # reliably persist through AOF base-file creation).
        # Long-term: move ACL config into ValkeySettings rendering.
        hash=$$(printf '%s' "${QUEUE_PASSWORD:?QUEUE_PASSWORD must be set for dev environment}" | sha256sum | cut -d' ' -f1)
        umask 077
        cat > /tmp/users.acl <<EOF
        user default on #$${hash} ~* &* +@all -flushall -flushdb -config -shutdown -slaveof -replicaof -debug
        EOF
        exec valkey-server \
          --appendonly yes \
          --appendfsync always \
          --aof-load-truncated yes \
          --maxmemory ${CHAOSCYPHER_VALKEY_MAXMEMORY:-2gb} \
          --maxmemory-policy noeviction \
          --aclfile /tmp/users.acl
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${QUEUE_PASSWORD:?QUEUE_PASSWORD must be set for dev environment}", "--no-auth-warning", "ping"]
      interval: ${CHAOSCYPHER_VALKEY_HEALTH_INTERVAL:-10s}
      timeout: ${CHAOSCYPHER_VALKEY_HEALTH_TIMEOUT:-3s}
      retries: 3
      start_period: ${CHAOSCYPHER_VALKEY_HEALTH_START:-10s}
    networks:
      - backend
    mem_limit: ${QUEUE_MEM_LIMIT:-2g}
    cpus: ${QUEUE_CPU_LIMIT:-1}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped

  # Cortex service (Full backend API with hot-reload)
  cortex:
    build:
      context: ../../..
      dockerfile: packages/docker/multi-container/cortex/Dockerfile.dev
    container_name: chaoscypher-cortex
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${CORTEX_HOST_PORT:-8080}:8080"  # Web UI API
    volumes:
      - ../../core/src/chaoscypher_core:/app/packages/core/src/chaoscypher_core  # Core hot-reload
      - ../../cortex/src/chaoscypher_cortex:/app/packages/cortex/src/chaoscypher_cortex  # Cortex hot-reload
      - app-data:/data
    environment:
      - CHAOSCYPHER_DATA_DIR=/data
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - QUEUE_HOST=valkey
      - QUEUE_PORT=6379
      - QUEUE_DB=0
      - QUEUE_PASSWORD=${QUEUE_PASSWORD:?QUEUE_PASSWORD must be set for dev environment}
      - LEXICON_URL=http://host.docker.internal:3001  # Lexicon package registry base URL
      - WATCHFILES_FORCE_POLLING=true
      - LOG_LEVEL=DEBUG
      - USE_JSON_LOGGING=false
      - HF_HUB_DISABLE_XET=1
      - HF_HUB_DISABLE_PROGRESS_BARS=1
      - TQDM_DISABLE=1
      - TOKENIZERS_PARALLELISM=false
      - CHAOSCYPHER_ALLOW_DEV_MODE=1
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/healthcheck.py"]
      interval: ${CHAOSCYPHER_HEALTH_INTERVAL:-30s}
      timeout: ${CHAOSCYPHER_HEALTH_TIMEOUT:-10s}
      retries: ${CHAOSCYPHER_HEALTH_RETRIES:-3}
      start_period: ${CHAOSCYPHER_HEALTH_START_PERIOD:-40s}
    networks:
      - frontend
      - backend
    mem_limit: ${CORTEX_MEM_LIMIT:-8g}
    cpus: ${CORTEX_CPU_LIMIT:-2}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped

  # Interface service (Web UI with Vite dev server)
  interface:
    build:
      context: ../../..
      dockerfile: packages/docker/multi-container/interface/Dockerfile.dev
    container_name: chaoscypher-interface
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${INTERFACE_HOST_PORT:-3000}:3000"  # Vite dev server
    volumes:
      - ../../interface:/app
      - /app/node_modules  # Prevent node_modules from being overwritten
    environment:
      - VITE_API_URL=http://cortex:8080  # Cortex backend (handles both full and reader mode)
    depends_on:
      cortex:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: ${CHAOSCYPHER_HEALTH_INTERVAL:-10s}
      timeout: ${CHAOSCYPHER_HEALTH_TIMEOUT:-5s}
      retries: ${CHAOSCYPHER_HEALTH_RETRIES:-3}
      start_period: ${CHAOSCYPHER_HEALTH_START_PERIOD:-15s}
    networks:
      - frontend
    mem_limit: ${INTERFACE_MEM_LIMIT:-1g}
    cpus: ${INTERFACE_CPU_LIMIT:-1}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Neuron Worker (unified: LLM semaphore=1 + Operations semaphore=8)
  neuron:
    build:
      context: ../../..
      dockerfile: packages/docker/multi-container/neuron/Dockerfile.dev
    container_name: chaoscypher-neuron
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../core/src/chaoscypher_core:/app/packages/core/src/chaoscypher_core  # Core hot-reload
      - ../../neuron/src/chaoscypher_neuron:/app/packages/neuron/src/chaoscypher_neuron  # Neuron hot-reload
      - app-data:/data
    environment:
      - CHAOSCYPHER_DATA_DIR=/data
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - QUEUE_HOST=valkey
      - QUEUE_PORT=6379
      - QUEUE_DB=0
      - QUEUE_PASSWORD=${QUEUE_PASSWORD:?QUEUE_PASSWORD must be set for dev environment}
      - LEXICON_URL=http://host.docker.internal:3001  # Lexicon package registry base URL
      - LOG_LEVEL=DEBUG
      - USE_JSON_LOGGING=false
      - HF_HUB_DISABLE_XET=1
      - HF_HUB_DISABLE_PROGRESS_BARS=1
      - TQDM_DISABLE=1
      - TOKENIZERS_PARALLELISM=false
      - WORKER_AUTO_RELOAD=true
      - WATCHFILES_FORCE_POLLING=true
      - CHAOSCYPHER_ALLOW_DEV_MODE=1
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    stop_grace_period: ${CHAOSCYPHER_WORKER_STOP_GRACE_PERIOD:-30s}
    mem_limit: ${NEURON_MEM_LIMIT:-8g}  # Memory limit for document processing
    cpus: ${NEURON_CPU_LIMIT:-2}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    command: ["cc-neuron"]
    healthcheck:
      test: ["CMD", "python", "/healthcheck.py"]
      interval: ${CHAOSCYPHER_HEALTH_INTERVAL:-30s}
      timeout: ${CHAOSCYPHER_HEALTH_TIMEOUT:-5s}
      retries: ${CHAOSCYPHER_HEALTH_RETRIES:-3}
      start_period: ${CHAOSCYPHER_HEALTH_START_PERIOD:-30s}

networks:
  frontend:
  backend:

volumes:
  valkey-data:
    driver: local
  app-data:
    driver: local
