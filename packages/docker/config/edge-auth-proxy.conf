# Shared protected API proxy guard.
#
# The server config must define:
#   set $chaoscypher_edge_auth_token "...";
# before including this file. The token is injected into Cortex only after
# nginx auth_request verifies the caller and sets X-Auth-User.
auth_request /auth/verify;
auth_request_set $auth_user $upstream_http_x_auth_user;
error_page 401 = @unauthorized;

include /etc/nginx/proxy-common.conf;
proxy_set_header X-Auth-User $auth_user;
proxy_set_header X-Auth-Edge-Token $chaoscypher_edge_auth_token;
