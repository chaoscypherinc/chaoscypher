# Chaos Cypher All-in-One — Startup mode (static only)
# Serves the startup page while Cortex is booting.
# No proxy_pass = no upstream errors during boot.
# Switched to the full config by nginx-ready once Cortex is listening.

server {
    listen 80;
    server_name _;
    include /etc/nginx/security-headers-no-csp.conf;

    root /usr/share/nginx/html;

    # Serve startup page for all routes
    location / {
        try_files /startup.html =503;
        add_header Content-Security-Policy "default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
        # Never cache the splash. Once nginx swaps to the full config the
        # same URL must return the SPA — a cached splash would leave the
        # browser looping on this page even though every service is up.
        add_header Cache-Control "no-store" always;
    }

    # Logo asset used by the startup page
    location = /startup-logo.png {
        alias /usr/share/nginx/html/logo.png;
    }

    # Health endpoint returns 503 during startup so the page's
    # fetch().then(r => { if (!r.ok) return null }) handles it cleanly.
    location /api/ {
        return 503;
    }
}

# Port 443 — same TLS-not-enabled stub as the full config
server {
    listen 443;
    server_name _;
    include /etc/nginx/security-headers-no-csp.conf;
    default_type application/json;
    return 200 '{"message": "TLS is not enabled. Configure TLS in Settings to use HTTPS."}';
}
