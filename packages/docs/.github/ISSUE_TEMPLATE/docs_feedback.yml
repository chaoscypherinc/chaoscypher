name: Documentation Feedback
description: Suggest a docs correction or improvement.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Page
      description: Which page needs attention?
      placeholder: https://chaoscypher.com/docs/...
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What is unclear, missing, outdated, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: If you know the fix, describe it here.
