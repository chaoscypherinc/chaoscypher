# All quality checks run locally before commits
# Tests run in Docker for isolation
#
# Setup: pre-commit install && pre-commit install --hook-type pre-push
# Manual run: pre-commit run --all-files

default_stages: [pre-commit]
fail_fast: false

repos:
  # ==========================================================================
  # Python: Format + Lint (local - fast)
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: ruff (lint + fix)
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff (format)

  # ==========================================================================
  # Python: Type Checking (local)
  # ==========================================================================
  - repo: local
    hooks:
      - id: mypy
        name: mypy (type check)
        # Runs in the workspace venv via uv so mypy resolves the full
        # dependency closure — identical to `make typecheck` and CI.
        #
        # The previous mirrors-mypy hook was a no-op: it ran
        # `mypy --config-file=pyproject.toml` with pass_filenames=false and no
        # target, which exits 2 ("Missing target ..."). Even with a target, its
        # isolated env (only pydantic/sqlmodel/fastapi/types-requests) could not
        # resolve the project's untyped deps (chardet, docx, ...) without an
        # unmaintainable ignore-imports list. A local hook avoids both problems
        # and matches this section's "(local)" intent.
        entry: uv run mypy packages/core/src packages/cortex/src packages/neuron/src packages/cli/src --config-file=pyproject.toml
        language: system
        pass_filenames: false
        files: ^packages/(core|cortex|neuron|cli)/src/
        require_serial: true

  # ==========================================================================
  # Secrets Detection (prevent credential leaks)
  # ==========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secrets)

  # ==========================================================================
  # File Hygiene
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of files
      - id: check-yaml
        name: check yaml syntax
        args: [--unsafe]  # Allow custom tags
      - id: check-json
        name: check json syntax
      - id: check-toml
        name: check toml syntax
      - id: check-added-large-files
        name: check for large files
        args: [--maxkb=1000]
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: debug-statements
        name: check for debug statements
      - id: check-case-conflict
        name: check case conflicts

  # ==========================================================================
  # Binary Asset Integrity (PNG signature check)
  # ==========================================================================
  # Guards against the c9e47c918 incident where a text-mode export stripped
  # the leading 0x89 and every \r from every committed PNG, leaving files
  # that 200-OK over HTTP but fail to decode in the browser.
  - repo: local
    hooks:
      - id: check-png-signature
        name: check PNG signature
        entry: uv run python scripts/check_png_signature.py
        language: system
        files: \.png$

  # ==========================================================================
  # Frontend: ESLint + TypeScript (local)
  # ==========================================================================
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd packages/interface && npm run lint'
        language: system
        files: ^packages/interface/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc
        name: tsc (type check frontend)
        entry: bash -c 'cd packages/interface && npx tsc --noEmit'
        language: system
        files: ^packages/interface/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ==========================================================================
  # CLAUDE.md Rules (custom architectural linting)
  # ==========================================================================
  # Two hooks:
  #   1. lint-claude         - fast AST sweep on commit (production checker)
  #   2. lint-claude-selftest - rule self-tests, only fired when a rule
  #      definition or its fixture changes. Catches the silent-break class
  #      that hit CC044 in May 2026. Heavy (semgrep boots in an isolated
  #      env), so we gate it on rule/fixture file changes rather than
  #      every commit. Full sweep also runs in `make lint-claude` and CI.
  - repo: local
    hooks:
      - id: lint-claude
        name: CLAUDE.md rules
        entry: uv run python scripts/lint_claude_rules.py
        language: system
        files: ^packages/(core|cortex|neuron|cli)/.*\.py$
        pass_filenames: false

      - id: lint-claude-selftest
        name: CLAUDE.md rule self-tests
        entry: uv run pytest packages/core/tests/unit/scripts/ -q
        language: system
        files: ^(scripts/lint_claude_rules\.py|tools/semgrep/rules/cc-.*\.yml|tools/semgrep/tests/cc-.*\.py|packages/core/tests/unit/scripts/.*\.py)$
        pass_filenames: false

  # ==========================================================================
  # Public-export hygiene — shipped code must not reference private docs
  # ==========================================================================
  # The private docs tree is stripped from the public export, so an in-code
  # reference to it becomes a dangling pointer that leaks private filenames.
  - repo: local
    hooks:
      - id: check-no-internal-refs
        name: no private docs refs in shipped code
        entry: uv run python scripts/check_no_internal_refs.py
        language: system
        files: >-
          (?x)^(
            (packages|e2e|scripts|tools|\.github)/.*\.(py|ts|tsx|js|jsx|md|mdx|ya?ml|json|sh|toml)$
            |(README|CLAUDE|CONTRIBUTING|SECURITY|CLA|CHANGELOG)\.md$
            |Makefile$
            |pyproject\.toml$
            |\.(pre-commit-config|gitleaks)\.(ya?ml|toml)$
            |\.dockerignore$
          )
        pass_filenames: false

      - id: check-spdx-headers
        name: SPDX license headers on shipped source
        entry: uv run python scripts/check_spdx_headers.py
        language: system
        files: ^packages/(core|cortex|neuron|cli)/src/.*\.py$|^packages/interface/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ==========================================================================
  # Dead Code Detection — Python (vulture)
  # ==========================================================================
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        name: vulture (Python dead code)
        args: [
          "packages/core/src",
          "packages/cortex/src",
          "packages/neuron/src",
          "packages/cli/src",
          ".vulture_whitelist.py",
          "--min-confidence", "80"
        ]

  # ==========================================================================
  # Dead Code Detection — Frontend (knip)
  # ==========================================================================
  - repo: local
    hooks:
      - id: knip
        name: knip (frontend dead code)
        entry: bash -c 'cd packages/interface && npm run deadcode'
        language: system
        files: ^packages/interface/.*\.(ts|tsx)$
        pass_filenames: false

  # ==========================================================================
  # License Scan (AGPL deny-list — protects dual-license model)
  # ==========================================================================
  # Only fires when a dep manifest changes, so normal commits stay fast.
  # Triggers: uv.lock, any pyproject.toml, frontend package.json / lockfile.
  # Policy: tools/license_check/policy.toml.
  - repo: local
    hooks:
      - id: license-check-python
        name: license-check (Python runtime closure)
        entry: uv run python scripts/license_check_python.py
        language: system
        files: ^(uv\.lock|.*pyproject\.toml)$
        pass_filenames: false

      - id: license-check-interface
        name: license-check (Frontend production deps)
        entry: uv run python scripts/license_check_interface.py
        language: system
        files: ^packages/interface/(package\.json|package-lock\.json)$
        pass_filenames: false

  # ==========================================================================
  # Pre-push hook: Full CI (portable — runs with or without make)
  # ==========================================================================
  # Runs the whole sweep including the Docker test suite (via run_ci's
  # docker-test step), so there's no separate pytest-docker hook.
  - repo: local
    hooks:
      - id: ci-docker
        name: CI (full pipeline)
        # Delegates to scripts/run_ci.py, the make-free equivalent of `make ci`,
        # so the hook runs on Windows (Git Bash has no make) and Linux alike.
        # language: system runs the entry directly (no shell), so no bash/make.
        entry: uv run python scripts/run_ci.py --mode docker
        language: system
        pass_filenames: false
        stages: [pre-push]
