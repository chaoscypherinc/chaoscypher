name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels: ["feature", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Setup / installation
        - Sources / ingestion
        - Extraction / knowledge graph
        - Search / chat
        - Workflows / automations
        - Lexicon Hub / packages
        - CLI
        - API / integration
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What workaround are you using now?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, sketches, or sample workflows.
