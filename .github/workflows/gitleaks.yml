# Gitleaks build-time secret scan
#
# Push enforcement enabled 2026-06-05 (pre-launch decision): the pre-commit
# hook catches secrets locally; this workflow is the CI defeat-path guard for
# `git commit --no-verify`. Also available via workflow_dispatch for ad-hoc
# audits. Mirrors the pre-commit gitleaks hook (v8.21.2) and the local
# `make lint-secrets` target.
#
# GITLEAKS_LICENSE: gitleaks-action requires a (free) license key for
# organization-owned repos — obtain at gitleaks.io and add as a repo secret
# before the first push to the public org repo, or org-repo runs will fail.
# Not required while this repo lives under a personal account.
#
# NOTE: intentionally NOT triggered on `pull_request`. The `push` trigger
# already fires on every commit to every branch (PR branches included), so a
# pull_request run would be a redundant second scan — and gitleaks-action's
# pull_request path calls the GitHub PR API (list commits / post comments),
# which 403s under this workflow's read-only `contents` token. Scanning on
# push keeps full coverage without that failure.

name: gitleaks

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # full history so the scan covers everything

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # free org key — see header
          GITLEAKS_VERSION: 8.21.2
          GITLEAKS_CONFIG: .gitleaks.toml
