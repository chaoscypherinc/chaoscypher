name: Publish GHCR Image

# Publishes the all-in-one image to GHCR.
#
# Triggers:
#   - a published GitHub Release (its vX.Y.Z tag) -> ALWAYS publishes; the
#     image is tagged with the semver (1.2.3 + 1.2), `latest`, and the commit
#     sha. A guard first verifies the tag matches the package versions.
#   - manual workflow_dispatch -> dry-run by default; set publish=true to push
#     `latest` + sha (fallback / out-of-band rebuilds).
#
# Cut an image release by publishing a GitHub Release named vX.Y.Z (bump the
# four packages/*/pyproject.toml to X.Y.Z in the release commit first). The
# same Release also drives the PyPI publish (publish-pypi.yml).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Push the built image to GHCR. Leave false for dry-run builds. (A published Release always publishes.)"
        type: boolean
        default: false
      extra_tag:
        description: "Optional extra tag to publish, such as alpha or edge."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/chaoscypherinc/chaoscypher
  # A published Release always publishes; a manual run honors the publish input.
  PUBLISH: ${{ github.event_name == 'release' || inputs.publish }}

jobs:
  build:
    name: Build all-in-one image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify tag matches package versions
        if: github.event_name == 'release'
        run: python3 scripts/check_release_version.py "${{ github.ref_name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: env.PUBLISH == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ env.PUBLISH == 'true' }}
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: packages/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ env.PUBLISH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Publish status
        run: |
          if [ "${{ env.PUBLISH }}" = "true" ]; then
            echo "Published image tags:" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dry-run build completed. Publish a vX.Y.Z Release (or re-run with publish=true) to push:" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '${{ steps.meta.outputs.tags }}' >> "$GITHUB_STEP_SUMMARY"
