name: Publish GHCR Image

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push the built image to GHCR. Leave false for dry-run builds."
        type: boolean
        default: false
      extra_tag:
        description: "Optional extra tag to publish, such as alpha or v0.1.0."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/chaoscypherinc/chaoscypher

jobs:
  build:
    name: Build all-in-one image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: inputs.publish
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: packages/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.publish }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Publish status
        run: |
          if [ "${{ inputs.publish }}" = "true" ]; then
            echo "Published image tags:" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dry-run build completed. Re-run with publish=true to push:" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '${{ steps.meta.outputs.tags }}' >> "$GITHUB_STEP_SUMMARY"
