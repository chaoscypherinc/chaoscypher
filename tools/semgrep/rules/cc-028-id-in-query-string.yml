#
# CC028 — Resource IDs belong in the path, not the query string.
#
# API_DESIGN.md § URL Conventions: /sources/{source_id} not
# /sources?id=... . Query params are for filters and pagination.

rules:
  - id: cc-028-id-in-query-string
    message: |
      ID in query string in route. IDs belong in the path: /resource/{id}.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/packages/cortex/**/api.py"
      exclude:
        - "**/tests/**"
    pattern-either:
      - patterns:
          - pattern: '@$ROUTER.$METHOD("$PATH", ...)'
          - metavariable-regex:
              metavariable: $METHOD
              regex: "^(get|post|put|patch|delete)$"
          - metavariable-regex:
              metavariable: $PATH
              # semgrep's metavariable-regex is a full-match (re.fullmatch
              # semantics). The pattern needs `.*` on both sides to find
              # `?id=` / `&id=` / `?source_id=` etc. anywhere in the path.
              # Prior versions had the regex anchored to the START of the
              # path (no leading `.*`), so it never matched a real route
              # and the rule silently no-op'd.
              regex: '.*[?&](?:[a-zA-Z_][a-zA-Z0-9_]*_)?id=.*'
