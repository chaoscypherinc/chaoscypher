# ============================================================================
# MyPy Configuration - Strict type checking
# ============================================================================

[tool.mypy]
python_version = "3.14"
# The app deploys on Linux (Docker); type-check against that platform so
# Unix-only stdlib (socket.AF_UNIX, fcntl.flock) and `sys.platform` branch
# narrowing resolve correctly even when `make typecheck` runs on Windows/macOS.
platform = "linux"

# Strict mode - matches TypeScript strictness
disallow_untyped_defs = true         # Require type hints on all functions
disallow_any_unimported = false      # Allow Any from third-party without stubs
no_implicit_optional = true          # Require explicit Optional[...]
strict_equality = true               # Prevent comparisons of incompatible types
warn_redundant_casts = true          # Catch unnecessary casts
warn_unused_ignores = true           # Catch unused # type: ignore comments
warn_unreachable = true              # Detect unreachable code
warn_return_any = true               # Warn if returning Any
warn_unused_configs = true           # Warn about unused config options
check_untyped_defs = true            # Type-check bodies of untyped functions
disallow_untyped_decorators = false  # Too strict for now (many decorators are untyped)

# Gradually tightening: disable global ignore for better type safety
ignore_missing_imports = false       # Changed from true - require explicit overrides

# ============================================================================
# MyPy Per-module Overrides
# ============================================================================

# Third-party libraries without type stubs or not available in environment
[[tool.mypy.overrides]]
module = [
    # No type support available
    "fastapi_pagination.*",  # Third-party FastAPI extension, no stubs


    # LangChain ecosystem - has type hints but unstable/incomplete
    # Keeping ignored to avoid noise from frequent API changes
    "langchain.*",
    "langchain_core.*",
    "langchain_ollama.*",
    "langchain_openai.*",
    "langchain_anthropic.*",
    "langchain_google_genai.*",
    "langgraph.*",

    # Google AI - has type hints but sometimes incomplete
    "google.generativeai.*",

    # Typed libraries not found in current environment
    # (Have built-in types but not installed/visible to MyPy)
    "click.*",               # Has py.typed but not in path
    "rich.*",                # Has py.typed but not in path
    "anthropic.*",           # Has py.typed but not in path
    "openai.*",              # Has py.typed but not in path
    "uvicorn.*",             # Has py.typed but not in path
    "bcrypt.*",              # Has py.typed but not in path
    "pydantic_ai.*",         # Has py.typed but not in path
    "structlog.*",           # Partial types, not in path
    "yaml.*",                # Has stubs (types-PyYAML) but not installed
    "tqdm.*",                # Has py.typed but not in path
    "python-dotenv.*",       # Has py.typed but not in path
    "bs4.*",                 # Optional dep (sphinx_handler.py imports inside try/except ImportError fallback)
]
ignore_missing_imports = true

# Internal package cross-dependencies (for packages that import each other)
# All internal packages are properly typed. Cross-package imports resolve via
# editable installs (pip install -e). This override is only needed in CI/Docker
# where packages may not all be installed in the same environment.
[[tool.mypy.overrides]]
module = [
    "chaoscypher_core.*",
    "chaoscypher_cortex.*",
    "chaoscypher_neuron.*",
    "chaoscypher_cli.*",
]
ignore_missing_imports = true

# Database migrations: Don't type-check
[[tool.mypy.overrides]]
module = "*.migrations.*"
ignore_errors = true

# Third-party libraries without type stubs (not in pyproject.toml ignore list)
[[tool.mypy.overrides]]
module = [
    "dynaconf.*",
    "pydantic_settings.*",
    "jsonref.*",
    "jsonschema.*",
    "openpyxl.*",  # XLSX loader; types-openpyxl is unmaintained
    "docutils.*",  # RST loader; types-docutils available but adds noise
    "pptx.*",      # PPTX loader; no py.typed marker upstream
    "chardet",     # Charset tiebreaker; no py.typed marker upstream
    "chardet.*",   # Charset tiebreaker sub-modules
    "docx",        # python-docx DOCX loader; no py.typed marker upstream
    "docx.*",      # python-docx sub-modules
    "ccx",         # ccx-format reference lib; no py.typed marker upstream
    "ccx.*",       # ccx-format sub-modules
]
ignore_missing_imports = true

# SQLModel/SQLAlchemy adapter files: disable arg-type and operator errors
# SQLModel class attributes (e.g., SourceRow.id) are typed as Python types (str, int)
# but are actually SQLAlchemy MappedColumn descriptors at class level. This causes
# false positives for load_only(), where(), .desc(), .in_(), .ilike() etc.
# No mypy plugin available for SQLModel to resolve this.
[[tool.mypy.overrides]]
module = [
    "chaoscypher_core.adapters.sqlite.mixins.*",
    "chaoscypher_core.adapters.sqlite.repos.graph.*",
    "chaoscypher_cortex.features.nodes.sql_repository",
    "chaoscypher_cortex.shared.reset.*",
    "chaoscypher_cortex.shared.database.base",
]
disable_error_code = [
    "arg-type",       # SQLModel class attrs vs Python types in load_only(), where()
    "operator",       # Column operations (.desc(), .in_(), .ilike())
    "union-attr",     # Column operations on Optional types after null checks
    "no-any-return",  # _entity_to_dict returns Any from SQLModel model_dump
    "return-value",   # _entity_to_dict returns None when entity not found (query pattern)
    "attr-defined",   # .desc(), .asc(), .in_() on model field types (datetime, str)
    "misc",           # list comprehension with _entity_to_dict producing Optional
    "unreachable",    # isinstance narrowing artifacts on SQLModel field types
    "unused-ignore",  # stale type: ignore comments from narrowing changes
    "override",       # implementation signature drift from protocol (list_sources pagination)
    "call-overload",  # .returning(Model.col, ...) — SQLModel attrs seen as Python types, not Mapped[]
]

# LangChain LLM providers: disable errors from poorly-typed LangChain SDK
# BaseChatModel.bind() returns Runnable (not BaseChatModel), causing assignment errors.
# Methods accessed on BaseChatModel | None after None checks still trigger union-attr.
# ToolCall vs dict[Any, Any] in format_tool_calls_response is a typing mismatch in LangChain.
[[tool.mypy.overrides]]
module = [
    "chaoscypher_core.adapters.llm.providers.*",
]
disable_error_code = ["union-attr", "assignment", "arg-type", "operator", "no-any-return", "call-arg"]

# Folded from chaoscypher-runtime (2026-04-20). Runtime had laxer mypy than
# core's strict mode; these subpackages are allowlisted while type debt is
# paid down incrementally. Remove entries as subpackages are fully typed.
# Tracked in Task 21 of the fold plan.
[[tool.mypy.overrides]]
module = [
    "chaoscypher_core.app_config.*",
    "chaoscypher_core.database.*",
    "chaoscypher_core.factories.*",
    "chaoscypher_core.llm_queue.*",
    "chaoscypher_core.operations.*",
    "chaoscypher_core.queue.*",
    "chaoscypher_core.repo_factories.*",
    "chaoscypher_core.streaming.*",
]
disallow_untyped_defs = false
warn_return_any = false
disable_error_code = ["union-attr", "assignment", "arg-type", "operator", "no-any-return", "call-arg", "attr-defined", "misc", "unused-ignore"]

# ============================================================================
# Interrogate Configuration - Docstring coverage tracking
# ============================================================================

[tool.interrogate]
# Fail if docstring coverage is below this percentage
fail-under = 100

# Directories to exclude from coverage.
# interrogate (1.7.0) feeds each entry into `fnmatch(file, exclude + "*")`, so
# patterns are glob-style and a basename match like "migrations" does NOT cover
# the nested `packages/.../database/migrations/` tree. Use "*migrations*" to
# match it on both Windows and POSIX without depending on path separators.
exclude = [
    "tests",
    "e2e",
    "*migrations*",
    ".tooling",
    "build",
    "dist",
]

# Coverage settings
ignore-module = false              # Require module-level docstrings
ignore-nested-functions = true     # Don't require docstrings for nested functions
ignore-private = true              # Don't require docstrings for private methods
ignore-magic = true                # Don't require docstrings for magic methods
ignore-init-method = false         # Require __init__ docstrings
ignore-semiprivate = false         # Require docstrings for _semiprivate methods

# Output settings
verbose = 1                        # Show detailed output
quiet = false                      # Don't suppress output
color = true                       # Use colored output

# ============================================================================
# Pytest Configuration - workspace-wide marker registration
# ============================================================================
# When pytest is invoked from the repo root spanning multiple packages, this
# section is the configfile (per-package [tool.pytest.ini_options] are
# package-local). Custom markers must be registered here to avoid
# PytestUnknownMarkWarning across the workspace.

[tool.pytest.ini_options]
# Combined cross-package runs (e.g. make test-cov-internal) use THIS file as
# the configfile, so asyncio_mode must be declared here — not just in the
# per-package pyproject files. Without it, the combined run defaults to
# "strict" and cli's unmarked `async def test_*` functions (which rely on
# cli/pyproject.toml's asyncio_mode="auto") fail with "async def functions are
# not natively supported". core/cortex/neuron mark their async tests
# explicitly, so "auto" is a no-op for them and fully backward-compatible.
asyncio_mode = "auto"
markers = [
    "unit: pure-unit tests (no I/O, no DB, no network) — opt-in via -m unit",
    "integration: integration tests (multiple components / packages)",
    "e2e: end-to-end tests (full stack, typically requires Docker)",
    "slow: slow tests (>1s execution time)",
    "docker: requires Docker services running",
    "core: tests scoped to the core package",
    "cortex: tests scoped to the cortex package",
    "neuron: tests scoped to the neuron package",
    "cli: CLI end-to-end tests (no Docker required)",
    "api: API end-to-end tests (requires Docker)",
    "browser: browser end-to-end tests (Playwright, requires Docker)",
    "fresh: fresh-database phase tests",
    "resume: resume / warm-start phase tests",
]

# ============================================================================
# Vulture Configuration - Dead code detection
# ============================================================================

[tool.vulture]
# Paths to scan for dead code
paths = ["packages/core/src", "packages/cortex/src", "packages/neuron/src", "packages/cli/src"]

# Whitelist file for false positives
exclude = [
    "**/tests/",
    "**/migrations/",
]

# Minimum confidence level (60% catches functions/classes, 80% catches imports, 100% catches variables)
min_confidence = 80

# Ignore specific names that are false positives
# Note: Most false positives are handled in .vulture_whitelist.py
